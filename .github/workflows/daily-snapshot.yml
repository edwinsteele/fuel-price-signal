name: Daily E10 snapshot

on:
  schedule:
    # 12:00 UTC = 10pm AEST / 11pm AEDT — end-of-day prices
    - cron: "0 12 * * *"
  workflow_dispatch:

jobs:
  snapshot:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v6

      - uses: astral-sh/setup-uv@v8.1.0
        with:
          python-version: "3.14"

      - name: Collect snapshot
        env:
          FUELAPI_API_KEY: ${{ secrets.FUELAPI_API_KEY }}
          FUELAPI_API_SECRET: ${{ secrets.FUELAPI_API_SECRET }}
        run: uv run python -m fuel_signal.live

      - name: Commit snapshot
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/snapshots/
          git diff --cached --quiet || git commit -m "snapshot: $(date -u +%Y-%m-%d)"
          git push
