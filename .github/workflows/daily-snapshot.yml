name: Daily E10 snapshot

on:
  schedule:
    # 10:00 UTC = 8pm AEST / 9pm AEDT — late evening, with buffer for Actions scheduling delays
    - cron: "0 10 * * *"
  workflow_dispatch:

jobs:
  snapshot:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v6

      - uses: astral-sh/setup-uv@v8.1.0
        with:
          python-version: "3.14"

      - name: Collect snapshot
        env:
          FUELAPI_API_KEY: ${{ secrets.FUELAPI_API_KEY }}
          FUELAPI_API_SECRET: ${{ secrets.FUELAPI_API_SECRET }}
        run: uv run python -m fuel_signal.live

      - name: Commit snapshot
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/snapshots/
          git diff --cached --quiet || git commit -m "snapshot: $(date -u +%Y-%m-%d)"
          max_attempts=5
          for attempt in $(seq 1 "$max_attempts"); do
            git push && break
            if [ "$attempt" -lt "$max_attempts" ]; then
              sleep_time=$((2 ** attempt))
              echo "Push failed (attempt $attempt/$max_attempts), rebasing on remote then retrying in ${sleep_time}s..."
              # main may have advanced (e.g. a merge landed); rebase before retry
              # so the loop recovers from non-fast-forward, not just transient errors.
              git pull --rebase || echo "rebase failed; retrying push anyway"
              sleep "$sleep_time"
            else
              echo "Push failed after $max_attempts attempts"
              exit 1
            fi
          done
