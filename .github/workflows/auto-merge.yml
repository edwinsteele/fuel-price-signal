name: Auto-merge chore PRs

# Fires when auto-merge-ok is applied, when CI finishes, and on a schedule.
# The schedule is needed because the min-age gate below typically rejects the
# label-time and CI-completion invocations (both happen too early), so we need
# a periodic sweep to re-evaluate once the review window has closed.
on:
  pull_request:
    types: [labeled]
  workflow_run:
    workflows: [CI]
    types: [completed]
  schedule:
    - cron: "*/10 * * * *"

jobs:
  auto-merge:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - name: Merge eligible PRs
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_REPO: ${{ github.repository }}
        run: |
          # Find all open PRs that carry all three required labels.
          prs=$(gh pr list \
            --label "claude-authored" \
            --label "chore" \
            --label "auto-merge-ok" \
            --state open \
            --json number \
            --jq '.[].number')

          if [ -z "$prs" ]; then
            echo "No eligible PRs found."
            exit 0
          fi

          # Minimum PR age before auto-merge fires. Gives external reviewers
          # (Sourcery, CodeRabbit) time to post comments and the worker time to
          # address them — otherwise the merge races the review loop and any
          # follow-up fixes end up stranded on the deleted branch (see PR #201).
          MIN_AGE_SECONDS=900

          for pr in $prs; do
            echo "=== Checking PR #$pr ==="

            created_at=$(gh pr view "$pr" --json createdAt --jq .createdAt)
            created_epoch=$(date -u -d "$created_at" +%s)
            now_epoch=$(date -u +%s)
            age=$((now_epoch - created_epoch))

            if [ "$age" -lt "$MIN_AGE_SECONDS" ]; then
              echo "PR #$pr: age ${age}s < ${MIN_AGE_SECONDS}s — skipping to leave a review window."
              continue
            fi

            # Count checks that are not yet successful or skipped.
            failing=$(gh pr checks "$pr" 2>/dev/null \
              | awk '$2 ~ /fail|error|pending|in_progress|queued/ {count++} END {print count+0}')

            if [ "$failing" -gt 0 ]; then
              echo "PR #$pr: $failing check(s) not yet green — skipping."
              continue
            fi

            echo "PR #$pr: all checks green, merging."
            gh pr merge "$pr" --squash --delete-branch
          done
