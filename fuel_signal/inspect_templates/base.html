<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>{% block title %}Fuel Price Signal{% endblock %}</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@600;700&family=DM+Sans:wght@400;500;600&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
{% if chart_type in ('line', 'scatter') %}
<script src="https://cdn.jsdelivr.net/npm/chart.js@4"></script>
<script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-annotation@3"></script>
<script>
document.addEventListener('DOMContentLoaded', () => {
  if (typeof Chart !== 'undefined') {
    Chart.defaults.color = '#94a3b8';
    Chart.defaults.borderColor = '#1e2d40';
  }
});
</script>
{% endif %}
<style>
:root {
  --bg:           #0d1117;
  --surface:      #161b27;
  --surface-alt:  #1a2235;
  --border:       #2d3748;
  --border-dim:   #1e2d40;
  --text:         #e2e8f0;
  --text-muted:   #94a3b8;
  --text-dim:     #64748b;
  --accent:       #f59e0b;
  --accent-dim:   rgba(245,158,11,.12);
  --blue:         #38bdf8;
  --green:        #34d399;
  --red:          #f87171;
  --font-ui:      'DM Sans', sans-serif;
  --font-head:    'Syne', sans-serif;
  --font-mono:    'JetBrains Mono', monospace;
}
*, *::before, *::after { box-sizing: border-box; }
body {
  font-family: var(--font-ui);
  font-size: 15px;
  background: var(--bg);
  color: var(--text);
  max-width: 1200px; margin: 2rem auto; padding: 0 1.25rem;
}
h1 {
  font-family: var(--font-head);
  font-size: 1.6rem; font-weight: 700;
  color: #fff; margin-bottom: .25rem; letter-spacing: -.01em;
}
h2 {
  font-family: var(--font-head);
  font-size: 1.1rem; font-weight: 600;
  margin-top: 2rem;
  padding: .4rem 0 .4rem .75rem;
  border-left: 3px solid var(--accent);
  color: #fff;
}
.meta { color: var(--text-muted); font-size: .875rem; margin-bottom: 1.5rem; }

/* Summary stat cards */
.stats { display: flex; gap: 1rem; flex-wrap: wrap; margin: 1rem 0; }
.stat {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: .9rem 1.4rem;
  min-width: 120px;
}
.stat-value {
  font-family: var(--font-mono);
  font-size: 1.9rem; font-weight: 700;
  color: #fff; line-height: 1.1;
}
.stat-label { font-size: .8rem; color: var(--text-muted); margin-top: .2rem; }

/* Controls form */
.controls {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 1rem 1.25rem; margin: 1.5rem 0;
}
.controls h3 { margin: 0 0 .75rem; font-size: .95rem; color: var(--accent); font-weight: 600; }
.controls-row { display: flex; gap: 1.5rem; flex-wrap: wrap; align-items: flex-start; }
.control-group { display: flex; flex-direction: column; gap: .35rem; }
.control-group > label:first-child { font-size: .8rem; font-weight: 600; color: var(--text-muted); text-transform: uppercase; letter-spacing: .04em; }
.control-group label { font-size: .875rem; font-weight: 400; color: var(--text); }
.series-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: .25rem; }
.series-grid label { display: flex; align-items: center; gap: .4rem; font-size: .85rem; cursor: pointer; color: var(--text); }
.series-grid label:hover { color: #fff; }
details { margin-bottom: .5rem; }
details summary {
  cursor: pointer; font-size: .85rem; font-weight: 600;
  color: var(--text-muted); padding: .2rem 0; user-select: none;
}
details[open] summary { color: var(--text); }

/* Form inputs */
select, input[type="date"] {
  background: var(--surface-alt);
  color: var(--text);
  border: 1px solid var(--border);
  border-radius: 4px;
  padding: .4rem .6rem;
  font-family: var(--font-ui);
  font-size: .875rem;
}
select:focus, input[type="date"]:focus, #station-input:focus {
  outline: none;
  border-color: var(--accent);
  box-shadow: 0 0 0 2px var(--accent-dim);
}

/* Typeahead */
.typeahead-wrap { position: relative; }
#station-input {
  padding: .4rem .6rem;
  border: 1px solid var(--border);
  border-radius: 4px;
  width: 220px;
  font-size: .875rem;
  background: var(--surface-alt);
  color: var(--text);
}
#station-suggestions {
  position: absolute; top: 100%; left: 0; right: 0; z-index: 100;
  background: var(--surface);
  border: 1px solid var(--border); border-top: none;
  border-radius: 0 0 4px 4px; max-height: 220px; overflow-y: auto;
}
.suggestion { padding: .45rem .7rem; cursor: pointer; font-size: .85rem; color: var(--text); }
.suggestion:hover { background: var(--surface-alt); color: #fff; }

/* Button */
.btn {
  background: var(--accent); color: #0d1117;
  border: none; border-radius: 5px;
  padding: .5rem 1.4rem; cursor: pointer;
  font-family: var(--font-ui); font-size: .9rem; font-weight: 600;
}
.btn:hover { background: #d97706; }

/* Group all/none toggles */
.group-toggles { font-size: .75rem; color: var(--text-dim); padding: .25rem 0 0 .5rem; }
.group-toggles a { color: var(--blue); text-decoration: none; }
.group-toggles a:hover { text-decoration: underline; }

/* Chart */
.chart-wrap { height: 460px; margin: 1rem 0; }
.peak-legend { font-size: .82rem; color: var(--text-muted); margin: -.4rem 0 .8rem; }
.peak-legend span { display: inline-block; margin-right: 1.2rem; }

/* Banner */
.banner { border-radius: 5px; padding: .5rem 1rem; margin: .5rem 0; font-size: .875rem; }
.banner-warn  { background: rgba(245,158,11,.1);  border: 1px solid rgba(245,158,11,.4);  color: #fbbf24; }
.banner-error { background: rgba(248,113,113,.1); border: 1px solid rgba(248,113,113,.4); color: #f87171; }
.banner-info  { background: rgba(56,189,248,.1);  border: 1px solid rgba(56,189,248,.35); color: #38bdf8; }

/* Heatmap */
.heatmap-outer { overflow-x: auto; margin: 1rem 0; }
.heatmap-table { border-collapse: collapse; font-size: .78rem; white-space: nowrap; }
.heatmap-table th {
  background: var(--surface); color: var(--text-muted);
  padding: .3rem .5rem; border: 1px solid var(--border);
  position: sticky; left: 0; z-index: 1;
}
.heatmap-table td { padding: 0; border: 1px solid var(--border-dim); min-width: 7px; width: 7px; text-align: center; }
.heatmap-table tr:nth-child(even) .hm-row-head { background: var(--surface-alt); }
.hm-row-head {
  position: sticky; left: 0;
  background: var(--surface);
  color: var(--text);
  border-right: 2px solid var(--border) !important;
  font-weight: 600; padding: .3rem .6rem;
}
.heatmap-legend { display: flex; gap: .5rem; align-items: center; font-size: .8rem; color: var(--text-muted); margin: .3rem 0; }
.heatmap-legend .swatch { display: inline-block; width: 18px; height: 14px; border-radius: 2px; }
.hm-scroll-btn {
  background: var(--surface-alt); border: 1px solid var(--border);
  color: var(--text); border-radius: 3px; cursor: pointer;
  font-size: .8rem; padding: .1rem .4rem; line-height: 1.2;
}
.hm-scroll-btn:hover { background: var(--border); }

/* Cycle state */
.cycle-box { font-size: .85rem; margin: .5rem 0; }

/* Table */
table { border-collapse: collapse; font-size: .875rem; }
th, td { text-align: left; padding: .4rem .7rem; border: 1px solid var(--border); }
th { background: var(--surface); color: var(--text-muted); }
td { color: var(--text); }

/* Nav */
nav {
  display: flex; align-items: center; gap: 1.5rem;
  margin-bottom: 1.5rem; padding-bottom: .6rem;
  border-bottom: 1px solid var(--border);
  font-size: .875rem;
}
.nav-brand {
  font-family: var(--font-head);
  font-size: .95rem; font-weight: 700;
  color: var(--accent); margin-right: auto;
  text-decoration: none; letter-spacing: .02em;
}
nav a { color: var(--text-muted); text-decoration: none; transition: color .15s; }
nav a:hover { color: var(--text); }
nav a.active { font-weight: 600; color: var(--accent); }

/* Lead/lag table */
.ll-table { border-collapse: collapse; font-size: .82rem; white-space: nowrap; }
.ll-table th, .ll-table td { padding: .3rem .55rem; border: 1px solid var(--border); text-align: right; }
.ll-table th:first-child, .ll-table td:first-child { text-align: left; min-width: 200px; }
.ll-table th { background: var(--surface); color: var(--text-muted); }
.ll-lead { background: rgba(52,211,153,.15);  color: #34d399; }
.ll-lag  { background: rgba(248,113,113,.15); color: #f87171; }
.ll-zero { background: var(--surface-alt); color: var(--text-muted); }
.ll-none { background: var(--surface);     color: var(--text-dim); }
.ll-median { font-weight: 700; border-left: 2px solid var(--accent) !important; }
</style>
</head>
<body>
<nav>
  <span class="nav-brand">⛽ FPS</span>
  <a href="/" {% if request.path == '/' %}class="active"{% endif %}>Workbench</a>
  <a href="/lead-lag" {% if request.path == '/lead-lag' %}class="active"{% endif %}>Lead / Lag</a>
</nav>
{% block content %}{% endblock %}
</body>
</html>
