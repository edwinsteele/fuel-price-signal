<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>{% block title %}Fuel Price Signal{% endblock %}</title>
{% if chart_type in ('line', 'scatter') %}
<script src="https://cdn.jsdelivr.net/npm/chart.js@4"></script>
<script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-annotation@3"></script>
{% endif %}
<style>
body {
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
  max-width: 1200px; margin: 2rem auto; padding: 0 1rem; color: #222;
}
h1 { margin-bottom: .25rem; }
h2 { margin-top: 2rem; border-bottom: 1px solid #ddd; padding-bottom: .3rem; }
.meta { color: #888; font-size: .875rem; margin-bottom: 1.5rem; }

/* Summary stat cards */
.stats { display: flex; gap: 1.5rem; flex-wrap: wrap; margin: 1rem 0; }
.stat { background: #f5f5f5; border-radius: 6px; padding: .8rem 1.4rem; }
.stat-value { font-size: 1.6rem; font-weight: 700; }
.stat-label { font-size: .85rem; color: #666; }

/* Controls form */
.controls { background: #f9f9f9; border: 1px solid #e0e0e0; border-radius: 8px;
            padding: 1rem 1.25rem; margin: 1.5rem 0; }
.controls h3 { margin: 0 0 .75rem; font-size: 1rem; }
.controls-row { display: flex; gap: 1.5rem; flex-wrap: wrap; align-items: flex-start; }
.control-group { display: flex; flex-direction: column; gap: .35rem; }
.control-group label { font-size: .85rem; font-weight: 600; color: #555; }
.series-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: .25rem; }
.series-grid label { display: flex; align-items: center; gap: .4rem; font-size: .85rem; cursor: pointer; }
details { margin-bottom: .5rem; }
details summary { cursor: pointer; font-size: .85rem; font-weight: 600; color: #444;
                   padding: .2rem 0; user-select: none; }
details[open] summary { color: #222; }

/* Typeahead */
.typeahead-wrap { position: relative; }
#station-input { padding: .4rem .6rem; border: 1px solid #ccc; border-radius: 4px; width: 220px; font-size: .875rem; }
#station-suggestions { position: absolute; top: 100%; left: 0; right: 0; z-index: 100;
                        background: #fff; border: 1px solid #ccc; border-top: none;
                        border-radius: 0 0 4px 4px; max-height: 220px; overflow-y: auto; }
.suggestion { padding: .45rem .7rem; cursor: pointer; font-size: .85rem; }
.suggestion:hover { background: #eef; }

/* Button */
.btn { background: #2563eb; color: #fff; border: none; border-radius: 5px;
       padding: .5rem 1.2rem; cursor: pointer; font-size: .9rem; }
.btn:hover { background: #1d4ed8; }

/* Group all/none toggles */
.group-toggles { font-size: .75rem; color: #888; padding: .25rem 0 0 .5rem; }
.group-toggles a { color: #2563eb; text-decoration: none; }
.group-toggles a:hover { text-decoration: underline; }

/* Chart */
.chart-wrap { height: 460px; margin: 1rem 0; }
.peak-legend { font-size: .82rem; color: #555; margin: -.4rem 0 .8rem; }
.peak-legend span { display: inline-block; margin-right: 1.2rem; }

/* Banner */
.banner { border-radius: 5px; padding: .5rem 1rem; margin: .5rem 0; font-size: .875rem; }
.banner-warn { background: #fef3c7; border: 1px solid #d97706; color: #92400e; }
.banner-error { background: #fee2e2; border: 1px solid #dc2626; color: #991b1b; }
.banner-info { background: #eff6ff; border: 1px solid #3b82f6; color: #1e40af; }

/* Heatmap CSS grid */
.heatmap-outer { overflow-x: auto; margin: 1rem 0; }
.heatmap-table { border-collapse: collapse; font-size: .78rem; white-space: nowrap; }
.heatmap-table th { background: #f0f0f0; padding: .3rem .5rem; border: 1px solid #ddd;
                     position: sticky; left: 0; z-index: 1; }
.heatmap-table td { padding: 0; border: 1px solid #e8e8e8; min-width: 7px; width: 7px; text-align: center; }
.heatmap-table tr:nth-child(even) .hm-row-head { background: #f5f5f5; }
.hm-row-head { position: sticky; left: 0; background: #f9f9f9;
                border-right: 2px solid #ccc !important; font-weight: 600; padding: .3rem .6rem; }
.heatmap-legend { display: flex; gap: .5rem; align-items: center; font-size: .8rem; margin: .3rem 0; }
.heatmap-legend .swatch { display: inline-block; width: 18px; height: 14px; border-radius: 2px; }
.hm-scroll-btn { background: #f0f0f0; border: 1px solid #ccc; border-radius: 3px; cursor: pointer;
                  font-size: .8rem; padding: .1rem .4rem; line-height: 1.2; }
.hm-scroll-btn:hover { background: #e0e0e0; }

/* Cycle state */
.cycle-box { font-size: .85rem; margin: .5rem 0; }

/* Table */
table { border-collapse: collapse; font-size: .875rem; }
th, td { text-align: left; padding: .4rem .7rem; border: 1px solid #ddd; }
th { background: #f0f0f0; }

/* Nav */
nav { display: flex; gap: 1rem; margin-bottom: 1.5rem; padding-bottom: .5rem;
      border-bottom: 1px solid #e0e0e0; font-size: .875rem; }
nav a { color: #2563eb; text-decoration: none; }
nav a:hover { text-decoration: underline; }
nav a.active { font-weight: 700; color: #111; }

/* Lead/lag table */
.ll-table { border-collapse: collapse; font-size: .82rem; white-space: nowrap; }
.ll-table th, .ll-table td { padding: .3rem .55rem; border: 1px solid #ddd; text-align: right; }
.ll-table th:first-child, .ll-table td:first-child { text-align: left; min-width: 200px; }
.ll-table th { background: #f0f0f0; }
.ll-lead { background: #d1fae5; color: #065f46; }  /* green */
.ll-lag  { background: #fee2e2; color: #991b1b; }  /* red  */
.ll-zero { background: #f3f4f6; color: #4b5563; }
.ll-none { background: #f9f9f9; color: #6b7280; }
.ll-median { font-weight: 700; border-left: 2px solid #aaa !important; }
</style>
</head>
<body>
<nav>
  <a href="/" {% if request.path == '/' %}class="active"{% endif %}>Workbench</a>
  <a href="/lead-lag" {% if request.path == '/lead-lag' %}class="active"{% endif %}>Lead / Lag</a>
</nav>
{% block content %}{% endblock %}
</body>
</html>
